<!DOCTYPE html>
<html>
<head>
    <title>Actualizar Vencimiento</title>
</head>
<body>
    <h1>Actualizar Vencimiento para {{ cliente.nombre }}</h1>
    
    <form method="POST">
        <label for="vencimiento">Nueva fecha de vencimiento:</label>
        <input type="date" id="vencimiento" name="vencimiento" value="{{ cliente.vencimiento or '' }}">
        
        <br><br>
        <button type="submit">Actualizar</button>
        <a href="{{ url_for('listar_clientes_html') }}">Cancelar</a>
    </form>
</body>
</html>
