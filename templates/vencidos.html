<!DOCTYPE html>
<html>
<head>
    <title>Clientes Vencidos</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .vencido-row {
            background-color: #ffcccc; /* rojo claro para vencidos */
        }
    </style>
</head>
<body>
    <h1>Clientes Vencidos</h1>
    
    <a href="{{ url_for('listar_clientes_html') }}">⬅️ Volver a la lista completa</a>
    
    <br><br>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Vencimiento</th>
                <th>Días vencido</th>
            </tr>
        </thead>
        <tbody>
            {% for cliente in clientes %}
            <tr class="vencido-row">
                <td>{{ cliente.id }}</td>
                <td>{{ cliente.nombre }}</td>
                <td>{{ cliente.telefono or '-' }}</td>
                <td>{{ cliente.vencimiento }}</td>
                <td>{{ cliente.dias_pasados }} días</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5">No hay clientes vencidos.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
